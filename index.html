<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Học trực tuyến CNTT</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }
        /* Định dạng bảng chính */
        
        table {
            border-collapse: collapse;
            border: none !important;
            /* Ghi đè thuộc tính border="1" */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            background-color: white;
            border-radius: 8px;
            overflow: hidden;
        }
        /* Cột bên trái (Menu) */
        
        td[width="200"] {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            transition: all 0.3s;
        }
        
        td[width="200"] h3 {
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        
        td[width="200"] p {
            padding: 10px;
            cursor: pointer;
            border-radius: 4px;
        }
        
        td[width="200"] p:hover {
            background-color: #34495e;
            color: #3498db;
        }
        /* Cột bên phải (Nội dung) */
        
        td:not([width="200"]) {
            padding: 30px;
            color: #333;
        }
        
        h2 {
            color: #2c3e50;
            text-transform: uppercase;
            font-size: 24px;
        }
        
        h3 {
            color: #e67e22;
        }
        
        ol {
            padding-left: 20px;
        }
        
        ol li {
            margin-bottom: 10px;
            font-weight: 500;
            color: #555;
        }
    </style>
</head>

<body>

    <table border="1" width="800" height="300">
        <tr>
            <td width="200" valign="top">
                <h3>Trang chủ</h3>
                <p>Khoá học</p>
                <p>Diễn đàn</p>
                <p>Liên hệ</p>
            </td>

            <td valign="top">

                <h2>Học trực tuyến cộng nghệ thông tin </h2>

                <h3>Các khoá học:</h3>

                <ol>
                    <li>lập trình cơ bản</li>
                    <li>Cấu trúc dữ liệu</li>
                    <li>Thiết ké web</li>
                </ol>

            </td>
        </tr>
    </table>

</body>

</html>
